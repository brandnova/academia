<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block subject %}{{ site_name }}{% endblock %}</title>
<style>
  body { margin:0; padding:0; background-color:#f5f5f5; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color:#1a1a1a; }
  .wrapper { width:100%; background-color:#f5f5f5; padding:32px 0; }
  .container { max-width:480px; margin:0 auto; background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e5e5e5; }
  .header { padding:24px 32px; border-bottom:1px solid #e5e5e5; }
  .header a { font-size:18px; font-weight:600; color:#1a1a1a; text-decoration:none; }
  .content { padding:32px; font-size:15px; line-height:1.6; color:#333333; }
  .content p { margin:0 0 16px; }
  .button { display:inline-block; padding:12px 24px; background-color:#2563eb; color:#ffffff !important; text-decoration:none; border-radius:6px; font-weight:600; font-size:14px; }
  .footer { padding:24px 32px; font-size:12px; color:#999999; border-top:1px solid #e5e5e5; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="container">
    <div class="header">
      <a href="{{ frontend_url }}">{{ site_name }}</a>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>You're receiving this email because you have an account on {{ site_name }}.</p>
    </div>
  </div>
</div>
</body>
</html>
